on: [push, pull_request]
name: Build IOS

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-only-ios:
    name: Build only (iOS)
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install .NET 8.0.x
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Install .NET Workloads
        run: dotnet workload install ios

      - name: Use Xcode 16.4
        run: sudo xcode-select -switch /Applications/Xcode_16.4.app

      - name: Restore iOS project
        run: dotnet restore osu.IOS/osu.iOS.csproj -p:TargetFramework=net8.0-ios

      - name: Publish iOS app
        run: |
          dotnet publish osu.IOS/osu.iOS.csproj \
            -f net8.0-ios \
            -p:BuildIpa=true

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: osu.IOS/bin/Release/net8.0-ios/ios-arm64/publish/*.ipa
